<!DOCTYPE html>
<html>
<head>
    <title>Size Chart</title>

    <style>
        table {
            width: 70%;
            margin: 40px auto;
            border-collapse: collapse;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        th {
            background-color: #f2f2f2;
            padding: 12px;
            border: 1px solid #ccc;
        }

        td {
            padding: 12px;
            border: 1px solid #ccc;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>

<body>

    <h2>Size Chart</h2>

    <table>
        <thead>
            <tr>
                <th>Size</th>
                <th>Chest</th>
                <th>Waist</th>
                <th>Length</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>S</td>
                <td>38</td>
                <td>36</td>
                <td>27</td>
            </tr>

            <tr>
                <td>M</td>
                <td>40</td>
                <td>38</td>
                <td>28</td>
            </tr>

            <tr>
                <td>L</td>
                <td>42</td>
                <td>40</td>
                <td>29</td>
            </tr>

            <tr>
                <td>XL</td>
                <td>44</td>
                <td>42</td>
                <td>30</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
