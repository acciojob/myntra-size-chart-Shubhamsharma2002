<!DOCTYPE html>
<html>
<head>
    <title>Size Chart</title>

    <style>
        table {
            border-collapse: collapse;
            width: 70%;
            margin: 20px auto;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

    <table>
        <thead>
            <tr>
                <th>Part</th>
                <th>XS</th>
                <th>S</th>
                <th>M</th>
                <th>L</th>
                <th>XL</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Waist</td>
                <td>25</td>
                <td>28</td>
                <td>30</td>
                <td>31</td>
                <td>32</td>
            </tr>

            <tr>
                <td>Length</td>
                <td>34</td>
                <td>34</td>
                <td>35</td>
                <td>36</td>
                <td>37</td>
            </tr>

            <tr>
                <td>Hips</td>
                <td>34</td>
                <td>34</td>
                <td>38</td>
                <td>40</td>
                <td>41</td>
            </tr>

            <tr>
                <td>Thigh</td>
                <td>21</td>
                <td>22</td>
                <td>23</td>
                <td>24</td>
                <td>25</td>
            </tr>

            <tr>
                <td>Inseam</td>
                <td>30</td>
                <td>30</td>
                <td>31</td>
                <td>31</td>
                <td>32</td>
            </tr>

            <tr>
                <td>Shoulder</td>
                <td>14</td>
                <td>15</td>
                <td>16</td>
                <td>17</td>
                <td>18</td>
            </tr>

            <tr>
                <td>Chest</td>
                <td>34</td>
                <td>34</td>
                <td>38</td>
                <td>40</td>
                <td>41</td>
            </tr>

            <tr>
                <td>Sleeve</td>
                <td>23</td>
                <td>24</td>
                <td>24</td>
                <td>25</td>
                <td>25</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
